networks:
  frontend:
    external: true

services:
  options-tracker:
    container_name: options-tracker-app
    build: .
    env_file:
      - ./server/.env
    volumes:
      - options-tracker-data:/app/data
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_PATH: /app/data/options.db
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1",
        ]
      interval: 90s
      timeout: 5s
      retries: 3
    networks:
      - frontend
    expose:
      - "3001"

volumes:
  options-tracker-data:
    name: options-tracker-data
    external: true
